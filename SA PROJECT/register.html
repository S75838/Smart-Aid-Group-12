<!DOCTYPE html>
<html>

<head>
    <title>Register | SMART-AID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow" style="width: 400px;">
            <h3 class="text-center mb-3">Register</h3>

            <form onsubmit="registerUser(event)">
                <input class="form-control mb-3" id="name" placeholder="Full Name" required>

                <select class="form-control mb-3" id="role" required>
                    <option value="victim">Victim</option>
                    <option value="volunteer">Volunteer</option>
                </select>

                <input class="form-control mb-3" id="phone" placeholder="Phone Number" required>

                <button class="btn btn-primary w-100">Register</button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script>
        function registerUser(event) {
            event.preventDefault();

            fetch("http://localhost:3001/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    role: document.getElementById("role").value,
                    phone: document.getElementById("phone").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "Success") {
                        alert("Registration successful!");
                        window.location.href = "login.html";
                    }
                })
                .catch(err => alert("Error registering user"));
        }
    </script>

</body>

</html>
