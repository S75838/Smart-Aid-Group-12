<!DOCTYPE html>
<html>

<head>
    <title>Register | SMART-AID</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
        }

        .register-card {
            width: 420px;
            border: none;
            border-radius: 20px;
        }

        .project-title {
            font-size: 32px;
            font-weight: bold;
            color: #0d6efd;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card register-card shadow-lg p-4">

            <!-- HEADER -->
            <div class="text-center mb-4">

                <div class="project-title">
                    SMART-AID
                </div>

                <h6 class="mt-2">
                    Disaster Relief Coordination Platform
                </h6>

                <hr>

                <h4 class="fw-bold">
                    User Registration
                </h4>

            </div>

            <!-- FORM -->
            <form onsubmit="registerUser(event)">

                <label class="fw-semibold mb-1">Full Name</label>
                <input class="form-control mb-3" id="name" placeholder="Enter your full name" required>

                <label class="fw-semibold mb-1">Role</label>
                <select class="form-control mb-3" id="role" required onchange="toggleExperience()">
                    <option value="victim">Victim</option>
                    <option value="volunteer">Volunteer</option>
                </select>

                <label class="fw-semibold mb-1">Phone Number</label>
                <input class="form-control mb-3" id="phone" placeholder="Enter your phone number" required>

                <!-- EXPERIENCE -->
                <div id="experienceDiv" style="display:none;">
                    <label class="fw-semibold mb-1">Experience</label>
                    <textarea class="form-control mb-3" id="experience" rows="4"
                        placeholder="Describe your volunteer experience, skills, or activities"></textarea>
                </div>

                <button class="btn btn-primary w-100">
                    Register
                </button>

            </form>

            <!-- LINK -->
            <div class="text-center mt-3">
                Already have an account?
                <a href="login.html">Login</a>
            </div>

        </div>

    </div>

    <script>
        function registerUser(event) {
            event.preventDefault();

            fetch("http://localhost:3001/users", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    role: document.getElementById("role").value,
                    phone: document.getElementById("phone").value,
                    experience: document.getElementById("experience").value
                })
            })
                .then(res => res.json())
                .then(data => {

                    if (data.status === "Success") {

                        alert("Registration successful!");

                        // clear form before redirect (optional nice UX)
                        document.getElementById("name").value = "";
                        document.getElementById("phone").value = "";
                        document.getElementById("experience").value = "";
                        document.getElementById("role").value = "victim";
                        document.getElementById("experienceDiv").style.display = "none";

                        window.location.href = "login.html";

                    } else {
                        alert(data.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Error registering user");
                });
        }

        function toggleExperience() {

            if (document.getElementById("role").value === "volunteer") {
                document.getElementById("experienceDiv").style.display = "block";
            } else {
                document.getElementById("experienceDiv").style.display = "none";
                document.getElementById("experience").value = "";
            }

        }
    </script>

</body>

</html>
