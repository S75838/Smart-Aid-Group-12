<!DOCTYPE html>
<html>

<head>
    <title>Login | SMART-AID</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
        }

        .login-card {
            width: 420px;
            border: none;
            border-radius: 20px;
        }

        .project-title {
            font-size: 32px;
            font-weight: bold;
            color: #0d6efd;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card login-card shadow-lg p-4">

            <!-- PROJECT TITLE -->
            <div class="text-center mb-4">

                <div class="project-title">
                    SMART-AID
                </div>

                <h6 class="mt-2">
                    Disaster Relief Coordination Platform
                </h6>

                <!-- <div class="subtitle">
                    Microservice-Based System for Victim & Volunteer Coordination
                </div> -->

                <hr>

                <h4 class="fw-bold">
                    User Login
                </h4>

            </div>

            <form onsubmit="loginUser(event)">

                <label class="fw-semibold mb-1">
                    Full Name
                </label>

                <input class="form-control mb-3" id="name" placeholder="Enter your full name" required>

                <label class="fw-semibold mb-1">
                    Phone Number
                </label>

                <input class="form-control mb-3" id="phone" placeholder="Enter your phone number" required>

                <button class="btn btn-success w-100">
                    Login
                </button>

            </form>

            <div class="text-center mt-3">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </div>

        </div>

    </div>

    <script>

        function loginUser(event) {

            event.preventDefault();

            fetch("http://localhost:3001/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    phone: document.getElementById("phone").value
                })
            })

                .then(async res => {

                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.message);
                    }

                    return data;
                })

                .then(data => {

                    localStorage.setItem(
                        "user",
                        JSON.stringify(data.user)
                    );

                    alert("Login successful!");

                    if (data.user.role === "admin") {
                        window.location.href = "admin.html";
                    }
                    else {
                        window.location.href = "dashboard.html";
                    }

                })

                .catch(err => {

                    alert(err.message);

                });

        }

    </script>

</body>

</html>
