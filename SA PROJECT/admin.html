<!DOCTYPE html>
<html>

<head>
    <title>SMART-AID Admin Dashboard</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f7fc;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .stat-card {
            color: white;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        table td,
        table th {
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark shadow px-4">

        <span class="navbar-brand fs-4">
            SMART-AID Admin Dashboard
        </span>

        <button class="btn btn-danger" onclick="logout()">
            Logout
        </button>

    </nav>


    <div class="container mt-4">

        <h3 class="mb-4">
            Welcome Admin
        </h3>


        <!-- STATISTICS -->

        <div class="row">

            <div class="col-md-3 mb-3">

                <div class="card stat-card bg-primary shadow">

                    <div class="card-body">

                        <h5>Total Requests</h5>

                        <h1 id="totalRequest">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card stat-card bg-warning shadow">

                    <div class="card-body">

                        <h5>Pending</h5>

                        <h1 id="pendingRequest">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card stat-card bg-success shadow">

                    <div class="card-body">

                        <h5>Accepted</h5>

                        <h1 id="acceptedRequest">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card stat-card bg-danger shadow">

                    <div class="card-body">

                        <h5>Cancelled</h5>

                        <h1 id="cancelledRequest">0</h1>

                    </div>

                </div>

            </div>

        </div>


        <!-- CHART -->

        <div class="card shadow mt-4">

            <div class="card-header bg-dark text-white">
                Request Analytics
            </div>

            <div class="card-body">

                <canvas id="myChart"></canvas>

            </div>

        </div>



        <!-- PENDING VOLUNTEERS -->

        <div class="card shadow mt-4">

            <div class="card-header bg-primary text-white">
                Pending Volunteer Approval
            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Experience</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="volunteerTable">

                    </tbody>

                </table>

            </div>

        </div>



        <!-- SYSTEM REQUESTS -->

        <div class="card shadow mt-4 mb-5">

            <div class="card-header bg-success text-white">
                System Requests
            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Requester</th>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Location</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="requestTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>



    <script>

        let chart;

        loadRequests();
        loadPendingVolunteers();


        // ===============================
        // LOAD REQUESTS
        // ===============================

        function loadRequests() {

            fetch("http://localhost:3002/requests")
                .then(res => res.json())
                .then(data => {

                    const table =
                        document.getElementById("requestTable");

                    table.innerHTML = "";

                    let pending = 0;
                    let accepted = 0;
                    let cancelled = 0;

                    data.data.forEach(r => {

                        let badge = "";

                        if (r.status === "Pending") {

                            badge =
                                `<span class="badge bg-warning text-dark">
                                    Pending
                                </span>`;

                            pending++;
                        }

                        if (r.status === "Accepted") {

                            badge =
                                `<span class="badge bg-success">
                                    Accepted
                                </span>`;

                            accepted++;
                        }

                        if (r.status === "Cancelled") {

                            badge =
                                `<span class="badge bg-danger">
                                    Cancelled
                                </span>`;

                            cancelled++;
                        }

                        table.innerHTML += `
                        <tr>

                            <td>${r.id}</td>

                            <td>${r.requester}</td>

                            <td>${r.item_bantuan}</td>

                            <td>${r.kuantiti}</td>

                            <td>${r.lokasi}</td>

                            <td>${badge}</td>

                        </tr>
                        `;
                    });

                    document.getElementById("totalRequest").innerText =
                        data.data.length;

                    document.getElementById("pendingRequest").innerText =
                        pending;

                    document.getElementById("acceptedRequest").innerText =
                        accepted;

                    document.getElementById("cancelledRequest").innerText =
                        cancelled;


                    createChart(pending, accepted, cancelled);

                });

        }



        // ===============================
        // LOAD PENDING VOLUNTEERS
        // ===============================

        function loadPendingVolunteers() {

            fetch("http://localhost:3001/volunteers/pending")
                .then(res => res.json())
                .then(data => {

                    const table =
                        document.getElementById("volunteerTable");

                    table.innerHTML = "";

                    data.data.forEach(v => {

                        table.innerHTML += `
                        <tr>

                            <td>${v.id}</td>

                            <td>${v.name}</td>

                            <td>${v.phone}</td>

                            <td>${v.experience}</td>

                            <td>

                                <button
                                    class="btn btn-success btn-sm"
                                    onclick="approveVolunteer(${v.id})">

                                    Approve

                                </button>

                            </td>

                        </tr>
                        `;
                    });

                });

        }



        // ===============================
        // APPROVE VOLUNTEER
        // ===============================

        function approveVolunteer(id) {

            fetch(
                `http://localhost:3001/volunteers/approve/${id}`,
                {
                    method: "PUT"
                }
            )
                .then(res => res.json())
                .then(data => {

                    alert("Volunteer approved!");

                    loadPendingVolunteers();

                });

        }



        // ===============================
        // PIE CHART
        // ===============================

        function createChart(pending, accepted, cancelled) {

            if (chart) {

                chart.destroy();

            }

            const ctx =
                document.getElementById("myChart");

            chart = new Chart(ctx, {

                type: 'pie',

                data: {

                    labels: [
                        'Pending',
                        'Accepted',
                        'Cancelled'
                    ],

                    datasets: [{

                        data: [
                            pending,
                            accepted,
                            cancelled
                        ]

                    }]
                }

            });

        }



        // ===============================
        // LOGOUT
        // ===============================

        function logout() {

            localStorage.removeItem("user");

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
