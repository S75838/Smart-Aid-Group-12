<!DOCTYPE html>
<html>

<head>
    <title>Dashboard | SMART-AID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">SMART-AID Dashboard</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </nav>

    <div class="container mt-4">

        <h3 id="welcome"></h3>

        <div id="victimPanel" style="display:none;">

            <div class="row">

                <div class="col-md-6">

                    <div class="card shadow border-0 mb-4">
                        <div class="card-header bg-primary text-white">
                            Submit Help Request
                        </div>

                        <div class="card-body">

                            <form onsubmit="sendRequest(event)">

                                <label>Item Needed</label>
                                <input class="form-control mb-3" id="item" required>

                                <label>Quantity</label>
                                <input class="form-control mb-3" id="qty" type="number" required>

                                <label>Location</label>
                                <input class="form-control mb-3" id="location" required>

                                <button class="btn btn-primary w-100">
                                    Submit Request
                                </button>

                            </form>

                        </div>
                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card shadow border-0">

                        <div class="card-header bg-success text-white">
                            Request Statistics
                        </div>

                        <div class="card-body">

                            <h5>Total Requests</h5>
                            <h2 id="totalRequests">0</h2>

                            <hr>

                            <h6>Pending</h6>
                            <span class="badge bg-warning text-dark" id="pendingCount">0</span>

                            <h6 class="mt-3">Accepted</h6>
                            <span class="badge bg-success" id="acceptedCount">0</span>

                            <h6 class="mt-3">Cancelled</h6>
                            <span class="badge bg-danger" id="cancelledCount">0</span>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow border-0">

                <div class="card-header bg-dark text-white">
                    My Help Requests
                </div>

                <div class="card-body">

                    <table class="table table-hover">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="myRequestsTable"></tbody>

                    </table>

                </div>

            </div>

        </div>

        <div id="volunteerPanel" style="display:none;">

            <!-- Available Requests -->
            <div class="card shadow mb-4">
                <div class="card-header bg-primary text-white">
                    Available Requests
                </div>

                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="table"></tbody>
                    </table>
                </div>
            </div>

            <!-- My Assigned Tasks -->
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    My Assigned Tasks
                </div>

                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Victim</th>
                                <th>Item</th>
                                <th>Status</th>
                                <th>Progress</th>
                                <th>Update</th>
                            </tr>
                        </thead>

                        <tbody id="myTaskTable"></tbody>

                    </table>
                </div>
            </div>

        </div>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            window.location.href = "login.html";
        }

        document.getElementById("welcome").innerText =
            "Welcome, " + user.name + " (" + user.role + ")";

        if (user.role === "victim") {

            document.getElementById("victimPanel").style.display = "block";

            loadMyRequests();
        }

        if (user.role === "volunteer") {
            document.getElementById("volunteerPanel").style.display = "block";

            loadRequests();
            loadMyTasks();
        }

        /* ---------------- VICTIM REQUEST ---------------- */
        function sendRequest(event) {
            event.preventDefault();

            fetch("http://localhost:3002/requests", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    requester: user.name,
                    item_bantuan: document.getElementById("item").value,
                    kuantiti: Number(document.getElementById("qty").value),
                    lokasi: document.getElementById("location").value
                })
            })
                .then(async res => {
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.message || "Request failed");
                    }

                    return data;
                })
                .then(data => {

                    alert("Request submitted successfully!");

                    document.getElementById("item").value = "";
                    document.getElementById("qty").value = "";
                    document.getElementById("location").value = "";

                    loadMyRequests();
                })
                .catch(err => {
                    console.error(err);
                    alert("Failed to submit request: " + err.message);
                });
        }

        function loadMyRequests() {

            fetch(
                `http://localhost:3002/requests/user/${user.name}`
            )
                .then(res => res.json())
                .then(data => {

                    const table =
                        document.getElementById("myRequestsTable");

                    table.innerHTML = "";

                    let pending = 0;
                    let accepted = 0;
                    let cancelled = 0;

                    data.data.forEach(r => {

                        let badge = "";

                        if (r.status === "Pending") {
                            badge =
                                `<span class="badge bg-warning text-dark">Pending</span>`;
                            pending++;
                        }

                        if (r.status === "Accepted") {
                            badge =
                                `<span class="badge bg-success">Accepted</span>`;
                            accepted++;
                        }

                        if (r.status === "Cancelled") {
                            badge =
                                `<span class="badge bg-danger">Cancelled</span>`;
                            cancelled++;
                        }

                        table.innerHTML += `
                            <tr>
                                <td>${r.id}</td>
                                <td>${r.item_bantuan}</td>
                                <td>${r.kuantiti}</td>
                                <td>${r.lokasi}</td>
                                <td>${badge}</td>
                                <td>

                                ${r.status === "Pending"
                                ?
                                `<button
                                        class="btn btn-danger btn-sm"
                                        onclick="cancelRequest(${r.id})">
                                        Cancel
                                    </button>`
                                :
                                "-"
                            }

                                </td>
                            </tr>
                        `;
                    });

                    document.getElementById("totalRequests").innerText =
                        data.data.length;

                    document.getElementById("pendingCount").innerText =
                        pending;

                    document.getElementById("acceptedCount").innerText =
                        accepted;

                    document.getElementById("cancelledCount").innerText =
                        cancelled;

                });
        }

        function cancelRequest(id) {

            if (!confirm("Cancel this request?"))
                return;

            fetch(
                `http://localhost:3002/requests/cancel/${id}`,
                {
                    method: "PUT"
                }
            )
                .then(res => res.json())
                .then(data => {

                    alert("Request cancelled");

                    loadMyRequests();
                });

        }

        /* ---------------- VOLUNTEER ---------------- */
        function loadRequests() {
            fetch("http://localhost:3002/requests")
                .then(res => res.json())
                .then(data => {

                    const table = document.getElementById("table");
                    table.innerHTML = "";

                    data.data.forEach(r => {

                        let badge = "";

                        if (r.status === "Pending") {
                            badge = `<span class="badge bg-warning text-dark">Pending</span>`;
                        }

                        if (r.status === "Accepted") {
                            badge = `<span class="badge bg-success">Accepted</span>`;
                        }

                        if (r.status === "Cancelled") {
                            badge = `<span class="badge bg-danger">Cancelled</span>`;
                        }

                        table.innerHTML += `
                        <tr>
                            <td>${r.id}</td>
                            <td>${r.item_bantuan}</td>
                            <td>${r.kuantiti}</td>
                            <td>${r.lokasi}</td>
                            <td>${badge}</td>
                            <td>
                                ${r.status === "Pending"
                                ? `<button class="btn btn-success btn-sm"
                                        onclick="accept(${r.id})">
                                        Accept
                                    </button>`
                                : `<button class="btn btn-secondary btn-sm" disabled>
                                        Not Available
                                    </button>`
                            }
                            </td>
                        </tr>
                        `;
                    });
                });
        }

        function accept(id) {
            const volunteer = JSON.parse(localStorage.getItem("user"));

            fetch("http://localhost:3003/volunteer/accept", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    requestId: id,
                    volunteerName: volunteer.name
                })
            })
                .then(res => res.json())
                .then(data => {
                    alert("Accepted!");
                    loadRequests();
                    loadMyTasks();
                });
        }

        function loadMyTasks() {

            fetch(`http://localhost:3002/requests/volunteer/${user.name}`)
                .then(res => res.json())
                .then(data => {

                    const table =
                        document.getElementById("myTaskTable");

                    table.innerHTML = "";

                    data.data.forEach(r => {

                        table.innerHTML += `
                <tr>

                    <td>${r.id}</td>

                    <td>${r.requester}</td>

                    <td>${r.item_bantuan}</td>

                    <td>${r.status}</td>

                    <td>${r.progress}</td>

                    <td>

                        <select
                            class="form-select form-select-sm"
                            onchange="updateProgress(${r.id}, this.value)">

                            <option>Waiting</option>
                            <option>On The Way</option>
                            <option>Delivered</option>

                        </select>

                    </td>

                </tr>
                `;

                    });

                });

        }

        function updateProgress(id, progress) {

            fetch(
                `http://localhost:3002/requests/progress/${id}`,
                {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        progress: progress
                    })
                }
            )
                .then(res => res.json())
                .then(data => {

                    if (progress === "Delivered") {

                        fetch(
                            `http://localhost:3002/requests/status/${id}`,
                            {
                                method: "PUT",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    status: "Completed"
                                })
                            }
                        );

                    }

                    loadMyTasks();

                });

        }

        /* ---------------- LOGOUT ---------------- */
        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
